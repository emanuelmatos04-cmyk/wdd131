<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review Form</title>
  <link rel="stylesheet" href="styles/review.css">
  <script src="scripts/review.js" defer></script>
</head>
<body>
  <header>
    <h1>Product Review Form</h1>
  </header>

  <main>
    <form method="get" action="review.html">
      <!-- Product Name -->
      <label for="product">Product Name:</label>
      <select id="product" name="product" required>
        <option value="" disabled selected>Select a Product ...</option>
        <!-- Options populated by JS -->
      </select>

      <!-- Overall Rating -->
      <fieldset>
        <legend>Overall Rating:</legend>
        <label><input type="radio" id="rate1" name="rating" value="1" required> ☆</label>
        <label><input type="radio" id="rate2" name="rating" value="2"> ☆☆</label>
        <label><input type="radio" id="rate3" name="rating" value="3"> ☆☆☆</label>
        <label><input type="radio" id="rate4" name="rating" value="4"> ☆☆☆☆</label>
        <label><input type="radio" id="rate5" name="rating" value="5"> ☆☆☆☆☆</label>
      </fieldset>

      <!-- Date of Installation -->
      <label for="installDate">Date of Installation:</label>
      <input type="date" id="installDate" name="installDate" required>

      <!-- Useful Features -->
      <fieldset>
        <legend>Which features did you find useful? (Check all that apply):</legend>
        <label><input type="checkbox" id="feature1" name="features" value="Durability"> Durability</label>
        <label><input type="checkbox" id="feature2" name="features" value="Ease of Use"> Ease of Use</label>
        <label><input type="checkbox" id="feature3" name="features" value="Performance"> Performance</label>
        <label><input type="checkbox" id="feature4" name="features" value="Design"> Design</label>
      </fieldset>

      <!-- Written Review -->
      <label for="review">Written Review (Optional):</label>
      <textarea id="review" name="review" rows="4" cols="40"></textarea>

      <!-- User Name -->
      <label for="username">Your Name (Optional):</label>
      <input type="text" id="username" name="username">

      <!-- Submit -->
      <input type="submit" value="Post Review">
    </form>
  </main>

  <footer>
    <p>&copy; 2026 ⚔️ Emanuel Matos ⚔️ Dominican Republic</p>
    <p>Last Modification: 06/06/2026 18:27:00</p>
  </footer>
</body>
</html>
